name: Publish Dashboard to Cloudflare Pages

on:
  push:
    paths:
      - .github/workflows/publish-dashboard.yaml
      - packages/dashboard/**
      - packages/pockethost/src/common/**
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/publish-dashboard.yaml
      - packages/dashboard/**
      - packages/pockethost/src/common/**

env:
  PUBLIC_APEX_DOMAIN: ${{ vars.PUBLIC_APEX_DOMAIN }}
  MAIN_BRANCH: main
  BRANCH_NAME: ${{ github.event.pull_request.head.ref || github.ref_name }}
  GITHUB_LINK: ${{ github.event_name == 'pull_request_target' && format('https://github.com/{0}/pull/{1}', github.repository, github.event.pull_request.number) || format('https://github.com/{0}/tree/{1}', github.repository, github.event.pull_request.head.ref || github.ref_name) }}
  COMMIT_URL: ${{ github.event_name == 'pull_request_target' && format('https://github.com/{0}/pull/{1}/commits/{2}', github.repository, github.event.pull_request.number, github.sha) || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}

jobs:
  publish:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    name: Publish to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve deploy trigger commits
        id: trigger
        run: |
          set -euo pipefail

          PATHS=(
            .github/workflows/publish-dashboard.yaml
            packages/dashboard
            packages/pockethost/src/common
          )

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
            LOG_ARGS=()
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.sha }}"
            LOG_ARGS=(-1)
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
            LOG_ARGS=()
          fi

          mapfile -t TRIGGER_LINES < <(git log "${LOG_ARGS[@]}" --format='%H|%h|%s' "$RANGE" -- "${PATHS[@]}")

          HEAD_FULL=$(git rev-parse HEAD)
          HEAD_SHORT=$(git rev-parse --short HEAD)
          HEAD_SUBJECT=$(git log -1 --format='%s')
          REPO="${{ github.repository }}"

          TRIGGER_SUMMARY=""
          HEAD_IS_TRIGGER=false
          for line in "${TRIGGER_LINES[@]}"; do
            full_sha="${line%%|*}"
            rest="${line#*|}"
            short_sha="${rest%%|*}"
            subject="${rest#*|}"
            link="[${short_sha}](https://github.com/${REPO}/commit/${full_sha}) \`${subject}\`"
            if [ -n "$TRIGGER_SUMMARY" ]; then
              TRIGGER_SUMMARY="${TRIGGER_SUMMARY}, "
            fi
            TRIGGER_SUMMARY="${TRIGGER_SUMMARY}${link}"
            if [ "$full_sha" = "$HEAD_FULL" ]; then
              HEAD_IS_TRIGGER=true
            fi
          done

          if [ ${#TRIGGER_LINES[@]} -eq 0 ]; then
            TRIGGER_SUMMARY="(path filter matched but no commits found in push range)"
          fi

          echo "head_short=${HEAD_SHORT}" >> "$GITHUB_OUTPUT"
          echo "head_subject<<EOF" >> "$GITHUB_OUTPUT"
          echo "$HEAD_SUBJECT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "trigger_summary=${TRIGGER_SUMMARY}" >> "$GITHUB_OUTPUT"
          echo "head_is_trigger=${HEAD_IS_TRIGGER}" >> "$GITHUB_OUTPUT"
          echo "trigger_count=${#TRIGGER_LINES[@]}" >> "$GITHUB_OUTPUT"

      - name: pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Prepare build
        run: |
          pnpm i
          cd packages/dashboard
          pnpm build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        id: deployment
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy ./packages/dashboard/build --project-name=pockethost --branch=${{ github.event_name == 'pull_request_target' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ HEAD: ${{ steps.deployment.outputs.deployment-alias-url }}
            ✅ Permalink: ${{ steps.deployment.outputs.deployment-url }}`
            })

      - name: Discord feature branch notification
        if: github.event_name == 'pull_request_target' || (github.event_name == 'push' && github.ref_name != env.MAIN_BRANCH)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: |-
            **DASHBOARD PREVIEW** ${{ steps.deployment.outputs.pages-deployment-alias-url }} by ${{ github.actor }} on [${{ github.repository }}@${{ env.BRANCH_NAME }}](${{ env.GITHUB_LINK }})
            Deployed @ [${{ steps.trigger.outputs.head_short }}](${{ env.COMMIT_URL }}) `${{ steps.trigger.outputs.head_subject }}`
            ${{ (steps.trigger.outputs.head_is_trigger != 'true' || steps.trigger.outputs.trigger_count != '1') && format('Dashboard changes in push: {0}', steps.trigger.outputs.trigger_summary) || '' }}

      - name: Discord live branch notification
        if: github.event_name == 'push' && github.ref_name == env.MAIN_BRANCH
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: |-
            **DASHBOARD LIVE** https://pockethost.io ([permalink](${{ steps.deployment.outputs.deployment-url }})) by ${{ github.actor }} on [${{ github.repository }}@${{ env.BRANCH_NAME }}](${{ env.GITHUB_LINK }})
            Deployed @ [${{ steps.trigger.outputs.head_short }}](${{ env.COMMIT_URL }}) `${{ steps.trigger.outputs.head_subject }}`
            ${{ (steps.trigger.outputs.head_is_trigger != 'true' || steps.trigger.outputs.trigger_count != '1') && format('Dashboard changes in push: {0}', steps.trigger.outputs.trigger_summary) || '' }}
