name: Publish Dashboard to Cloudflare Pages

on:
  push:
    paths:
      - .github/workflows/publish-dashboard.yaml
      - packages/dashboard/**
      - packages/pockethost/src/common/**
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/publish-dashboard.yaml
      - packages/dashboard/**
      - packages/pockethost/src/common/**

env:
  PUBLIC_APEX_DOMAIN: ${{ vars.PUBLIC_APEX_DOMAIN }}
  MAIN_BRANCH: main
  BRANCH_NAME: ${{ github.event.pull_request.head.ref || github.ref_name }}
  GITHUB_LINK: ${{ github.event_name == 'pull_request_target' && format('https://github.com/{0}/pull/{1}', github.repository, github.event.pull_request.number) || format('https://github.com/{0}/tree/{1}', github.repository, github.event.pull_request.head.ref || github.ref_name) }}
  COMMIT_URL: ${{ github.event_name == 'pull_request_target' && format('https://github.com/{0}/pull/{1}/commits/{2}', github.repository, github.event.pull_request.number, github.sha) || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}

jobs:
  publish:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    name: Publish to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve deploy trigger commits
        id: trigger
        run: |
          set -euo pipefail

          PATHS=(
            .github/workflows/publish-dashboard.yaml
            packages/dashboard
            packages/pockethost/src/common
          )

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
            LOG_ARGS=()
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.sha }}"
            LOG_ARGS=(-1)
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
            LOG_ARGS=()
          fi

          mapfile -t TRIGGER_LINES < <(git log "${LOG_ARGS[@]}" --format='%H|%h|%s' "$RANGE" -- "${PATHS[@]}")

          HEAD_FULL=$(git rev-parse HEAD)
          HEAD_SHORT=$(git rev-parse --short HEAD)
          HEAD_SUBJECT=$(git log -1 --format='%s')
          REPO="${{ github.repository }}"
          MAX_TRIGGER_COMMITS=5
          MAX_SUBJECT_LEN=72

          TRIGGER_SUMMARY=""
          HEAD_IS_TRIGGER=false
          shown=0
          for line in "${TRIGGER_LINES[@]}"; do
            full_sha="${line%%|*}"
            rest="${line#*|}"
            short_sha="${rest%%|*}"
            subject="${rest#*|}"
            if [ "$full_sha" = "$HEAD_FULL" ]; then
              HEAD_IS_TRIGGER=true
            fi
            shown=$((shown + 1))
            if [ "$shown" -gt "$MAX_TRIGGER_COMMITS" ]; then
              continue
            fi
            if [ "${#subject}" -gt "$MAX_SUBJECT_LEN" ]; then
              subject="${subject:0:$((MAX_SUBJECT_LEN - 1))}…"
            fi
            link="[${short_sha}](https://github.com/${REPO}/commit/${full_sha}) \`${subject}\`"
            if [ -n "$TRIGGER_SUMMARY" ]; then
              TRIGGER_SUMMARY="${TRIGGER_SUMMARY}, "
            fi
            TRIGGER_SUMMARY="${TRIGGER_SUMMARY}${link}"
          done

          remaining=$((${#TRIGGER_LINES[@]} - MAX_TRIGGER_COMMITS))
          if [ "$remaining" -gt 0 ]; then
            if [ "${{ github.event_name }}" = "pull_request_target" ]; then
              COMPARE_URL="https://github.com/${REPO}/pull/${{ github.event.pull_request.number }}/commits"
            elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              COMPARE_URL="https://github.com/${REPO}/commit/${HEAD_FULL}"
            else
              COMPARE_URL="https://github.com/${REPO}/compare/${{ github.event.before }}...${HEAD_FULL}"
            fi
            if [ -n "$TRIGGER_SUMMARY" ]; then
              TRIGGER_SUMMARY="${TRIGGER_SUMMARY}, "
            fi
            TRIGGER_SUMMARY="${TRIGGER_SUMMARY}and ${remaining} more ([compare](${COMPARE_URL}))"
          fi

          if [ ${#TRIGGER_LINES[@]} -eq 0 ]; then
            TRIGGER_SUMMARY="(path filter matched but no commits found in push range)"
          fi

          echo "head_short=${HEAD_SHORT}" >> "$GITHUB_OUTPUT"
          echo "head_subject<<EOF" >> "$GITHUB_OUTPUT"
          echo "$HEAD_SUBJECT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "trigger_summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TRIGGER_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "head_is_trigger=${HEAD_IS_TRIGGER}" >> "$GITHUB_OUTPUT"
          echo "trigger_count=${#TRIGGER_LINES[@]}" >> "$GITHUB_OUTPUT"

      - name: pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Prepare build
        run: |
          pnpm i
          cd packages/dashboard
          pnpm build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        id: deployment
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy ./packages/dashboard/build --project-name=pockethost --branch=${{ github.event_name == 'pull_request_target' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ HEAD: ${{ steps.deployment.outputs.deployment-alias-url }}
            ✅ Permalink: ${{ steps.deployment.outputs.deployment-url }}`
            })

      - name: Build Discord message
        id: discord
        env:
          HEAD_SHORT: ${{ steps.trigger.outputs.head_short }}
          HEAD_SUBJECT: ${{ steps.trigger.outputs.head_subject }}
          HEAD_IS_TRIGGER: ${{ steps.trigger.outputs.head_is_trigger }}
          TRIGGER_COUNT: ${{ steps.trigger.outputs.trigger_count }}
          TRIGGER_SUMMARY: ${{ steps.trigger.outputs.trigger_summary }}
          DEPLOY_URL: ${{ steps.deployment.outputs.deployment-url }}
          PREVIEW_URL: ${{ steps.deployment.outputs.pages-deployment-alias-url }}
        run: |
          set -euo pipefail

          truncate_discord() {
            local msg="$1"
            if [ "${#msg}" -le 2000 ]; then
              printf '%s' "$msg"
              return
            fi
            printf '%s' "${msg:0:1997}..."
          }

          trigger_line=""
          if [ "$HEAD_IS_TRIGGER" != "true" ] || [ "$TRIGGER_COUNT" != "1" ]; then
            trigger_line=$'\n'"Dashboard changes in push: ${TRIGGER_SUMMARY}"
          fi

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "${{ env.MAIN_BRANCH }}" ]; then
            MESSAGE="**DASHBOARD LIVE** https://pockethost.io ([permalink](${DEPLOY_URL})) by ${{ github.actor }} on [${{ github.repository }}@${{ env.BRANCH_NAME }}](${{ env.GITHUB_LINK }})
          Deployed @ [${HEAD_SHORT}](${{ env.COMMIT_URL }}) \`${HEAD_SUBJECT}\`${trigger_line}"
          else
            MESSAGE="**DASHBOARD PREVIEW** ${PREVIEW_URL} by ${{ github.actor }} on [${{ github.repository }}@${{ env.BRANCH_NAME }}](${{ env.GITHUB_LINK }})
          Deployed @ [${HEAD_SHORT}](${{ env.COMMIT_URL }}) \`${HEAD_SUBJECT}\`${trigger_line}"
          fi

          MESSAGE=$(truncate_discord "$MESSAGE")
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$MESSAGE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Discord feature branch notification
        if: github.event_name == 'pull_request_target' || (github.event_name == 'push' && github.ref_name != env.MAIN_BRANCH)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: ${{ steps.discord.outputs.message }}

      - name: Discord live branch notification
        if: github.event_name == 'push' && github.ref_name == env.MAIN_BRANCH
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: ${{ steps.discord.outputs.message }}
