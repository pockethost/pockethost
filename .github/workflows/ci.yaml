name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mothership-hooks:
    name: Mothership hooks freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify pb_hooks matches TS source
        run: pnpm check:mothership-hooks
