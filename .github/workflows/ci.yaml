name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mothership-hooks:
    name: Mothership hooks freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify pb_hooks matches TS source
        run: pnpm check:mothership-hooks
